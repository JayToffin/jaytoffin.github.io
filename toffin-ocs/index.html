<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filter Produk</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:Inter,sans-serif;
    color:#fff;
}

.filter-page{
    max-width:430px;
    margin:auto;
    min-height:100vh;
    padding-bottom:100px;
}

.header{
    padding:20px;
    text-align:center;
    font-weight:600;
    border-bottom:1px solid #1e1e1e;
}

.section{
    padding:20px;
    border-bottom:1px solid #1a1a1a;
}

.section-title{
    font-size:14px;
    font-weight:600;
    margin-bottom:15px;
}

.sort-group{
    display:flex;
    gap:10px;
}

.sort-btn{
    flex:1;
    height:42px;
    border-radius:10px;
    border:1px solid #333;
    background:none;
    color:#999;
    cursor:pointer;
}

.sort-btn.active{
    border-color:#ff9f1a;
    color:#ff9f1a;
}

.active-filters{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.filter-tag{
    background:#111;
    border:1px solid #333;
    border-radius:20px;
    padding:8px 12px;
    font-size:12px;
}

.accordion{
    border:1px solid #222;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:10px;
}

.accordion-header{
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

.accordion-header small{
    color:#ff9f1a;
}

.accordion-body{
    padding:0 14px 14px;
}

.checkbox-group{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.checkbox-item{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
}

.checkbox-item input{
    width:18px;
    height:18px;
    accent-color:#ff9f1a;
}

.brand-search{
    width:100%;
    height:44px;
    border-radius:10px;
    border:1px solid #222;
    background:#111;
    color:#fff;
    padding:0 14px;
    margin-bottom:15px;
}

.price-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.price-value{
    color:#ff9f1a;
    font-weight:600;
}

.range-group{
    position:relative;
}

.range{
    width:100%;
    accent-color:#ff9f1a;
}

.price-inputs{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.price-box{
    flex:1;
    height:42px;
    border:1px solid #222;
    border-radius:10px;
    background:#111;
    color:#999;
    text-align:center;
}

.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#000;
    border-top:1px solid #222;
    padding:15px;
}

.footer-inner{
    max-width:430px;
    margin:auto;
    display:flex;
    gap:12px;
}

.btn-reset{
    width:120px;
    height:50px;
    background:none;
    border:1px solid #ff4d4d;
    color:#ff4d4d;
    border-radius:12px;
}

.btn-apply{
    flex:1;
    height:50px;
    border:none;
    border-radius:12px;
    background:#ff9f1a;
    color:#000;
    font-weight:600;
}
</style>
</head>

<body>

<div class="filter-page">

    <div class="header">
        Filter & Urutkan
    </div>

    <!-- SORT -->
    <div class="section">
        <div class="section-title">Urutkan</div>

        <div class="sort-group">
            <button class="sort-btn active">Harga Tertinggi</button>
            <button class="sort-btn">Harga Terendah</button>
        </div>
    </div>

    <!-- ACTIVE FILTER -->
    <div class="section">
        <div class="section-title">Filter Aktif</div>

        <div class="active-filters">
            <div class="filter-tag">Sauce ✕</div>
            <div class="filter-tag">Coffee Beans ✕</div>
            <div class="filter-tag">SMEG ✕</div>
        </div>
    </div>

    <!-- CATEGORY -->
    <div class="section">

        <div class="section-title">Kategori</div>

        <div class="accordion">

            <div class="accordion-header">
                <span>Ingredients <small>(2)</small></span>
                <span>⌃</span>
            </div>

            <div class="accordion-body">

                <div class="checkbox-group">

                    <label class="checkbox-item">
                        <input type="checkbox" checked>
                        Sauce
                    </label>

                    <label class="checkbox-item">
                        <input type="checkbox" checked>
                        Coffee Beans
                    </label>

                    <label class="checkbox-item">
                        <input type="checkbox">
                        Powder
                    </label>

                    <label class="checkbox-item">
                        <input type="checkbox">
                        Pure Extract
                    </label>

                    <label class="checkbox-item">
                        <input type="checkbox">
                        Concentrate
                    </label>

                </div>

            </div>

        </div>

        <div class="accordion">
            <div class="accordion-header">
                <span>Coffee Machine</span>
                <span>›</span>
            </div>
        </div>

        <div class="accordion">
            <div class="accordion-header">
                <span>Grinder</span>
                <span>›</span>
            </div>
        </div>

        <div class="accordion">
            <div class="accordion-header">
                <span>Gelato & Soft Ice Cream</span>
                <span>›</span>
            </div>
        </div>

        <div class="accordion">
            <div class="accordion-header">
                <span>Beverage Maker</span>
                <span>›</span>
            </div>
        </div>

    </div>

    <!-- BRAND -->
    <div class="section">

        <div class="section-title">Brand</div>

        <input
            type="text"
            class="brand-search"
            placeholder="Cari brand..."
        >

        <div class="checkbox-group">

            <label class="checkbox-item">
                <input type="checkbox" checked>
                SMEG
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                VBM
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                Nuova Simonelli
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                Victoria Arduino
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                Allegra
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                Rocket
            </label>

        </div>

    </div>

    <!-- PRICE -->
    <div class="section">

        <div class="section-title">Harga</div>

        <div class="price-header">
            <span>Range Harga</span>
            <span class="price-value">Rp 0 - Rp 50jt</span>
        </div>

        <div class="range-group">
            <input type="range" class="range">
        </div>

        <div class="price-inputs">

            <input
                class="price-box"
                value="Harga Minimum"
            >

            <input
                class="price-box"
                value="Harga Maksimum"
            >

        </div>

    </div>

</div>

<div class="footer">

    <div class="footer-inner">

        <button class="btn-reset">
            Reset
        </button>

        <button class="btn-apply">
            Terapkan Filter
        </button>

    </div>

</div>

</body>
</html>
