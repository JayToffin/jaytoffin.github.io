<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Officine Allegra</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* Tidak bisa scroll */

    body {
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;

    img {

      max-height: 20%;
      object-fit: contain;
    }
  </style>
</head>

    alt="Center Image"
  />
