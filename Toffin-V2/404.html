      left: 50%;

      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(232, 133, 42, 0.08) 0%, transparent 65%);
      pointer-events: none;
    }
    .error-content {
      position: relative;
      max-width: 560px;
      text-align: center;
      z-index: 1;

    .error-eyebrow {

      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 1rem;
    }
    .error-code {
      font-family: var(--font-serif);
      font-size: clamp(7rem, 22vw, 12rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--white);
      margin: 0;
      background: linear-gradient(180deg, var(--white) 0%, rgba(255, 255, 255, 0.3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-headline {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 4.5vw, 2.25rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--white);
      margin: 0.5rem 0 1rem;
      letter-spacing: -0.01em;
    }
    .error-message {
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.6);
      max-width: 420px;
      margin: 0 auto 2rem;
    }
    .error-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .error-actions .btn { min-width: 160px; }
    .btn-error-primary {
      background: var(--amber);
      color: var(--white);
    }
    .btn-error-primary:hover {
      background: var(--amber-light);
      transform: translateY(-1px);
    }
    .btn-error-ghost {
      background: transparent;
      color: var(--white);
      border: 1.5px solid rgba(255, 255, 255, 0.35);
    }
    .btn-error-ghost:hover {
      border-color: rgba(255, 255, 255, 0.8);
    }
    .error-help {
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
    }
    .error-help a {
      color: var(--amber);
      text-decoration: none;
      font-weight: 600;
    }
    .error-help a:hover { color: var(--white); }

      top: 1.5rem;
      left: 1.5rem;
      z-index: 2;
